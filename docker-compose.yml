services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./app.db:/app/app.db
    environment:
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - DB_PATH=/app/app.db
      - SUPERVISOR_POLL_SECONDS=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
